# ACTC 網站：MongoDB + Node（web）+ Caddy 反向代理
# 使用方式：
#   cp env.docker.example .env.docker
#   編輯 .env.docker 至少設定 JWT_SECRET、SITE_URL（對外網址，勿含 :5001）
#   docker compose --env-file .env.docker up --build
#
# 對外：http://本機或網域/  與 https://…/（443 為內部憑證，正式網域請改 Caddyfile）
# 後台：http://…/admin   （Node 僅在 Docker 網路內聽 5001，由 Caddy 轉發）

services:
  mongo:
    image: mongo:7.0
    container_name: actc-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: actc_website
    volumes:
      - mongo-data:/data/db
    networks:
      - actc-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: actc-web
    restart: unless-stopped
    env_file:
      - .env.docker
    expose:
      - "5001"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "5001"
      MONGO_URI: mongodb://mongo:27017/actc_website
      MONGO_SERVER_SELECTION_TIMEOUT_MS: "30000"
      JWT_SECRET: ${JWT_SECRET:?請在 .env.docker 設定 JWT_SECRET}
      # 對外網址（經 Caddy 80/443），勿再帶 :5001；未設 .env 時預設正式網域，避免驗證信變成 localhost
      SITE_URL: ${SITE_URL:-https://www.actc-tw.org}
      # 其餘（含 SMTP）由 .env.docker 經 env_file 注入，勿將密碼寫進此檔
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - actc-net

  caddy:
    image: caddy:2-alpine
    container_name: actc-caddy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # 僅內網自簽 HTTPS 時取消下行註解，並改用 Caddyfile.selfsigned.example 內容作為 Caddyfile
      # - ./caddy-certs:/certs:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web
    networks:
      - actc-net

volumes:
  mongo-data:
    name: actc_mongo_data
  uploads-data:
    name: actc_uploads_data
  caddy-data:
    name: actc_caddy_data
  caddy-config:
    name: actc_caddy_config

networks:
  actc-net:
    name: actc_net
