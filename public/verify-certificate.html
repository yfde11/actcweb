<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>證書驗證 - ACTC</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-lg shadow max-w-md w-full">
        <h2 class="text-2xl font-bold mb-4">證書驗證</h2>
        <div class="space-y-4">
            <div>
                <label class="block text-sm text-gray-600 mb-1">輸入證書編號</label>
                <input type="text" id="certNumber" placeholder="ACTC-EXAM-YYYY-XXXXXX" 
                       class="w-full border rounded px-3 py-2" />
            </div>
            <button onclick="verifyCertificate()" 
                    class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
                驗證
            </button>
            <div id="result" class="mt-4"></div>
        </div>
    </div>
    <script>
        async function verifyCertificate() {
            const certNumber = document.getElementById('certNumber').value.trim();
            if (!certNumber) return;
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p class="text-sm text-gray-500">驗證中...</p>';
            
            try {
                const res = await fetch(`/api/certificates/verify/${certNumber}`);
                const data = await res.json();
                
                if (res.ok) {
                    const cert = data.data;
                    resultDiv.innerHTML = `
                        <div class="p-4 bg-green-50 border border-green-200 rounded">
                            <p class="text-green-800 font-medium">✅ 證書有效</p>
                            <p class="text-sm text-green-700 mt-2">考試：${cert.exam?.title || '考試'}</p>
                            <p class="text-sm text-green-700">持證人：${cert.user?.fullName || cert.user?.username || '未知'}</p>
                            <p class="text-sm text-green-700">發證日期：${new Date(cert.issuedAt).toLocaleDateString()}</p>
                            ${cert.expiresAt ? `<p class="text-sm text-green-700">有效期限：${new Date(cert.expiresAt).toLocaleDateString()}</p>` : ''}
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="p-4 bg-red-50 border border-red-200 rounded">
                            <p class="text-red-800 font-medium">❌ 驗證失敗</p>
                            <p class="text-sm text-red-700">${data.error?.message || '證書不存在或已過期'}</p>
                        </div>
                    `;
                }
            } catch (e) {
                resultDiv.innerHTML = '<p class="text-sm text-red-700">驗證失敗，請稍後再試。</p>';
            }
        }
        
        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            const cert = params.get('cert');
            if (cert) {
                document.getElementById('certNumber').value = cert;
                verifyCertificate();
            }
        });
    </script>
</body>
</html>
